# Daily digest — install stack must be `pip install -r requirements.txt` only (v1.4).
# STATE_DIR below is on the ephemeral runner disk unless you add restore/persist steps (see README).
name: Daily digest

on:
  schedule:
    # 08:00 China Standard Time (UTC+8) → 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    env:
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      EMAIL_SUBJECT_PREFIX: ${{ secrets.EMAIL_SUBJECT_PREFIX }}
      EMAIL_SUBJECT: ${{ secrets.EMAIL_SUBJECT }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      STORE_TYPE: json
      STATE_DIR: ${{ github.workspace }}/.state
      SUMMARY_MODE: template
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run digest
        run: python -m app.main
